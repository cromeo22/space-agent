<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="application-name" content="Space Agent" />
    <meta name="apple-mobile-web-app-title" content="Space Agent" />
    <meta name="theme-color" content="#050816" />
    <title>Enter Space | Space Agent</title>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="stylesheet" href="/pages/res/space-backdrop.css" />
    <style>
      :root {
        color-scheme: dark;
        font-family: "Space Grotesk", "Avenir Next", "Segoe UI", sans-serif;
        --color-canvas: #050816;
        --color-canvas-elevated: #09111f;
        --color-canvas-deep: #02050d;
        --color-surface-1: #0d1628;
        --color-surface-2: #121d33;
        --color-surface-3: #182540;
        --color-surface-glass: rgba(11, 18, 34, 0.78);
        --color-border-soft: rgba(148, 167, 201, 0.16);
        --color-border-strong: rgba(168, 186, 219, 0.28);
        --color-text-primary: #f3f7ff;
        --color-text-secondary: #b8c4da;
        --color-text-tertiary: #8e9bb2;
        --color-accent-primary: #7ddcff;
        --color-accent-primary-strong: #94bcff;
        --color-accent-primary-soft: rgba(125, 220, 255, 0.14);
        --color-accent-secondary: #79edd8;
        --color-accent-ink: #04101d;
        --color-backdrop-glow-primary: rgba(148, 188, 255, 0.18);
        --color-backdrop-glow-secondary: rgba(121, 237, 216, 0.14);
        --color-backdrop-glow-depth: rgba(59, 95, 172, 0.26);
        --color-backdrop-star-strong: rgba(255, 255, 255, 0.76);
        --color-backdrop-star-soft: rgba(255, 255, 255, 0.26);
        --color-backdrop-star-accent: rgba(148, 188, 255, 0.48);
        --color-backdrop-star-halo: rgba(255, 255, 255, 0.12);
        --color-backdrop-star-halo-accent: rgba(148, 188, 255, 0.16);
        --radius-control: 16px;
        --space-3: 0.875rem;
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
      }

      body.space-theme-canvas {
        display: grid;
        align-items: center;
        min-height: 100vh;
        padding: clamp(0.875rem, 3vw, 2rem);
        overflow-x: hidden;
        overflow-y: auto;
      }

      @keyframes login-fadein {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      @keyframes login-fadeup {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .intro-art {
        animation: login-fadein 1.35s ease-out both;
        animation-delay: 0ms;
      }

      h1 {
        animation: login-fadeup 1.35s ease-out both;
        animation-delay: 330ms;
      }

      .intro-copy {
        animation: login-fadeup 1.35s ease-out both;
        animation-delay: 600ms;
      }

      .launcher-actions {
        animation: login-fadeup 0.7s ease-out both;
        animation-delay: 1150ms;
      }

      .instance-version {
        animation: login-fadeup 0.7s ease-out both;
        animation-delay: 1320ms;
      }

      @media (prefers-reduced-motion: reduce) {
        .intro-art,
        h1,
        .intro-copy,
        .launcher-actions,
        .instance-version {
          animation: none;
        }
      }

      .shell {
        position: relative;
        z-index: 1;
        width: min(56rem, 100%);
        margin: 0 auto;
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(19.5rem, 24rem);
        gap: clamp(1.5rem, 4vw, 3rem);
        align-items: center;
      }

      .intro {
        position: relative;
        display: grid;
        gap: 0.9rem;
        padding-block: clamp(0.5rem, 2vw, 1.5rem);
      }

      .intro-floating-cluster {
        position: relative;
        display: grid;
        grid-template-columns: minmax(0, 15.5rem) minmax(6.8rem, 9.8rem);
        gap: clamp(0.3rem, 1.5vw, 0.95rem);
        align-items: center;
        width: fit-content;
        max-width: 100%;
      }

      .intro-title {
        --intro-title-float-x: 0px;
        --intro-title-float-y: 0px;
        --intro-title-rotate: 0deg;
        position: relative;
        z-index: 1;
        min-width: 0;
        transform:
          translate3d(var(--intro-title-float-x), var(--intro-title-float-y), 0)
          rotate(var(--intro-title-rotate));
        transform-origin: 52% 52%;
        will-change: transform;
      }

      .intro-art {
        position: relative;
        min-height: clamp(6.8rem, 15vw, 9.8rem);
        display: grid;
        place-items: center;
      }

      .intro-astronaut {
        --astronaut-float-x: 0px;
        --astronaut-float-y: 0px;
        --astronaut-rotate: 0deg;
        position: relative;
        z-index: 0;
        width: clamp(6.9rem, 15vw, 9.8rem);
        opacity: 0.94;
        pointer-events: none;
        user-select: none;
        transform:
          translate3d(var(--astronaut-float-x), var(--astronaut-float-y), 0)
          rotate(var(--astronaut-rotate));
        transform-origin: 52% 56%;
        filter:
          drop-shadow(0 10px 22px rgba(0, 0, 0, 0.32))
          drop-shadow(0 0 18px rgba(148, 188, 255, 0.14));
        will-change: transform;
      }

      h1 {
        margin: 0;
        max-width: 7ch;
        font-size: clamp(2.7rem, 7vw, 4.6rem);
        line-height: 0.96;
        letter-spacing: -0.05em;
      }

      .intro-copy {
        max-width: 17rem;
        margin: 0;
        color: var(--color-text-secondary);
        font-size: 1rem;
        line-height: 1.5;
      }

      .launcher-actions {
        display: grid;
        gap: 1.2rem;
        align-self: center;
      }

      .launcher-link {
        display: grid;
        place-items: center;
        width: 100%;
        min-height: calc(0.88rem * 2 + 1rem);
        padding: 0.88rem 1rem;
        border-radius: var(--radius-control);
        font-size: 1rem;
        font-weight: 700;
        line-height: 1.4;
        text-align: center;
        text-decoration: none;
        transition:
          box-shadow 160ms ease,
          background-color 160ms ease,
          border-color 160ms ease,
          color 160ms ease,
          opacity 160ms ease,
          transform 160ms ease;
      }

      .launcher-link:hover,
      .launcher-link:focus-visible {
        transform: translateY(-1px);
      }

      .launcher-link:focus-visible {
        outline: none;
        box-shadow: 0 0 0 4px rgba(125, 220, 255, 0.12);
      }

      .launcher-link-primary {
        color: var(--color-accent-ink);
        background: linear-gradient(
          135deg,
          var(--color-accent-primary-strong) 0%,
          var(--color-accent-secondary) 100%
        );
        box-shadow: 0 12px 26px rgba(59, 163, 186, 0.24);
      }

      .launcher-link-primary:hover,
      .launcher-link-primary:focus-visible {
        box-shadow: 0 16px 30px rgba(59, 163, 186, 0.28);
      }

      .launcher-link-secondary {
        color: #ffffff;
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(148, 167, 201, 0.12);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
      }

      .launcher-link-secondary:hover,
      .launcher-link-secondary:focus-visible {
        background: rgba(255, 255, 255, 0.04);
        border-color: rgba(168, 186, 219, 0.24);
      }

      .instance-version {
        grid-column: 1 / -1;
        justify-self: center;
        margin: 0;
        color: #ffffff;
        font-size: 0.92rem;
        font-weight: 700;
        line-height: 1.4;
        text-align: center;
        opacity: 0.9;
        pointer-events: none;
        text-shadow:
          0 1px 18px rgba(255, 255, 255, 0.22),
          0 9px 24px rgba(0, 0, 0, 0.38);
        user-select: none;
      }

      @media (max-width: 760px) {
        body.space-theme-canvas {
          padding: 1rem 1.45rem 1.35rem;
        }

        .shell {
          grid-template-columns: 1fr;
          gap: 1rem;
        }

        .intro {
          max-width: 100%;
          padding-block: 0 0.2rem;
          padding-inline: 0.8rem;
        }

        .intro-floating-cluster {
          grid-template-columns: minmax(0, 12.6rem) clamp(8.1rem, 36vw, 10.2rem);
          gap: 0;
        }

        .intro-art {
          min-height: clamp(8.1rem, 36vw, 10.2rem);
          justify-items: start;
        }

        .intro-astronaut {
          width: clamp(8.1rem, 36vw, 10.2rem);
        }

        h1 {
          max-width: 6.3ch;
          font-size: clamp(2.25rem, 12vw, 3.3rem);
        }

        .intro-copy {
          max-width: 11.6rem;
          font-size: 0.9rem;
          line-height: 1.42;
        }

        .launcher-actions {
          margin-top: 1.9rem;
          gap: 1.35rem;
          padding-inline: 0.4rem;
        }
      }

      @media (max-width: 520px) {
        body.space-theme-canvas {
          padding: 1.05rem 1.7rem 1.5rem;
        }

        .intro {
          padding-inline: 1rem;
        }

        .intro-floating-cluster {
          grid-template-columns: minmax(0, 10.8rem) clamp(7.35rem, 36vw, 8.85rem);
          gap: 0;
        }

        .intro-art {
          min-height: clamp(7.35rem, 36vw, 8.85rem);
          justify-items: start;
        }

        .intro-astronaut {
          width: clamp(7.35rem, 36vw, 8.85rem);
          opacity: 0.9;
        }

        .intro-copy {
          font-size: 0.95rem;
          line-height: 1.5;
        }

        .launcher-actions {
          margin-top: 2.15rem;
          gap: 1.5rem;
          padding-inline: 0.55rem;
        }

        .launcher-link {
          padding-block: 0.88rem;
        }
      }
    </style>
  </head>
  <body class="space-theme-canvas">
    <div class="space-backdrop" data-space-backdrop aria-hidden="true">
      <div class="space-backdrop-layer space-backdrop-glow"></div>
      <div class="space-backdrop-layer space-backdrop-stars space-backdrop-stars-deep"></div>
      <div class="space-backdrop-layer space-backdrop-stars space-backdrop-stars-far"></div>
      <div class="space-backdrop-layer space-backdrop-stars space-backdrop-stars-mid"></div>
      <div class="space-backdrop-layer space-backdrop-stars space-backdrop-stars-near"></div>
      <div class="space-backdrop-layer space-backdrop-stars space-backdrop-stars-close"></div>
      <div class="space-backdrop-trails">
        <div class="space-backdrop-trail" data-space-backdrop-trail></div>
        <div class="space-backdrop-trail" data-space-backdrop-trail></div>
      </div>
    </div>
    <main class="shell">
      <section class="intro" aria-label="Space Agent overview">
        <div id="intro-floating-cluster" class="intro-floating-cluster">
          <div id="intro-title" class="intro-title">
            <h1>Space Agent</h1>
          </div>
          <div class="intro-art" aria-hidden="true">
            <img
              id="intro-astronaut"
              class="intro-astronaut"
              src="/pages/res/astronaut_no_bg.webp"
              alt=""
              decoding="async"
              draggable="false"
            />
          </div>
        </div>
        <p class="intro-copy">
          Free and open-source AI agent<br />
          that builds your space.<br />
          Right in the browser.
        </p>
      </section>

      <section class="launcher-actions" aria-label="Launcher actions">
        <a id="enter-space-link" class="launcher-link launcher-link-primary" href="/">Enter Space</a>
        <a id="enter-admin-link" class="launcher-link launcher-link-secondary" href="/admin">Admin Mode</a>
      </section>

      <p class="instance-version" aria-label="Instance version">
        Version <span><!-- SPACE_PROJECT_VERSION --></span>
      </p>
    </main>
    <script src="/pages/res/space-backdrop.js"></script>
    <script>
      const ENTER_PAGE_PATH = "/enter";
      const ENTER_TAB_ACCESS_KEY = "space.enter.tab-access";
      const introEnterSpaceLink = document.getElementById("enter-space-link");
      const introAdminLink = document.getElementById("enter-admin-link");
      const TAU = Math.PI * 2;
      const TITLE_FLOAT_PARAMS = Object.freeze({
        movementDistance: 1.5,
        movementSpeed: 1.5,
        rotationDistance: 1.5,
        rotationSpeed: 1.5
      });
      const ASTRONAUT_FLOAT_VARIANT = 0.5;
      const ASTRONAUT_FLOAT_PARAMS = Object.freeze({
        movementDistance: 3,
        movementSpeed: 0.9,
        rotationDistance: 0.6,
        rotationSpeed: 0.45
      });
      const astronautOrbitOffsetTurns = positiveModulo(ASTRONAUT_FLOAT_VARIANT, 1);
      const astronautRotationOffsetTurns = positiveModulo(ASTRONAUT_FLOAT_VARIANT * 1.61803398875, 1);
      const astronautOrbitDirection = positiveModulo(ASTRONAUT_FLOAT_VARIANT, 2) < 1 ? 1 : -1;
      const astronautRotationDirection =
        positiveModulo(ASTRONAUT_FLOAT_VARIANT * 0.73, 2) < 1 ? 1 : -1;
      const astronautSpeedMultiplier = 0.82 + (positiveModulo(ASTRONAUT_FLOAT_VARIANT * 2.37, 1) * 0.56);
      const TITLE_FLOAT_PROFILE = buildFloatProfile(
        Object.freeze({
          orbitPeriodMs: 11800,
          rotationAmplitude: 4.5,
          rotationPeriodMs: 16200,
          xRadius: 6.6,
          yRadius: 7.4
        }),
        TITLE_FLOAT_PARAMS
      );
      const ASTRONAUT_FLOAT_PROFILE = buildFloatProfile(
        Object.freeze({
          orbitPeriodMs: 12400,
          rotationAmplitude: 100,
          rotationLimitEnabled: false,
          rotationMaxDeg: 30,
          rotationPeriodMs: 17600,
          xRadius: 7.2,
          yRadius: 8.2
        }),
        Object.freeze({
          ...ASTRONAUT_FLOAT_PARAMS,
          movementSpeed: ASTRONAUT_FLOAT_PARAMS.movementSpeed * astronautSpeedMultiplier,
          rotationSpeed: ASTRONAUT_FLOAT_PARAMS.rotationSpeed * astronautSpeedMultiplier
        })
      );
      const introTitle = document.getElementById("intro-title");
      const introAstronaut = document.getElementById("intro-astronaut");
      const spaceBackdropRoot = document.querySelector("[data-space-backdrop]");
      const spaceThemeCanvas = document.body;
      const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)");
      let introFloatFrame = 0;
      let introFloatStartTime = 0;

      window.SpaceBackdrop?.install?.(spaceBackdropRoot, {
        canvas: spaceThemeCanvas,
        motionQuery: prefersReducedMotion
      });

      function setIntroTitlePose(x, y, rotation) {
        if (!introTitle) {
          return;
        }

        introTitle.style.setProperty("--intro-title-float-x", `${x.toFixed(1)}px`);
        introTitle.style.setProperty("--intro-title-float-y", `${y.toFixed(1)}px`);
        introTitle.style.setProperty("--intro-title-rotate", `${rotation.toFixed(1)}deg`);
      }

      function setAstronautPose(x, y, rotation) {
        if (!introAstronaut) {
          return;
        }

        introAstronaut.style.setProperty("--astronaut-float-x", `${x.toFixed(1)}px`);
        introAstronaut.style.setProperty("--astronaut-float-y", `${y.toFixed(1)}px`);
        introAstronaut.style.setProperty("--astronaut-rotate", `${rotation.toFixed(1)}deg`);
      }

      function scaleDuration(durationMs, speedMultiplier) {
        return durationMs / Math.max(speedMultiplier, 0.01);
      }

      function positiveModulo(value, divisor) {
        return ((value % divisor) + divisor) % divisor;
      }

      function buildFloatProfile(baseProfile, params) {
        const rotationMaxDeg =
          baseProfile.rotationLimitEnabled === false
            ? Infinity
            : (baseProfile.rotationMaxDeg ?? Infinity);

        return Object.freeze({
          orbitPeriodMs: scaleDuration(baseProfile.orbitPeriodMs, params.movementSpeed),
          rotationAmplitude: Math.min(
            rotationMaxDeg,
            baseProfile.rotationAmplitude * params.rotationDistance
          ),
          rotationPeriodMs: scaleDuration(baseProfile.rotationPeriodMs, params.rotationSpeed),
          xRadius: baseProfile.xRadius * params.movementDistance,
          yRadius: baseProfile.yRadius * params.movementDistance
        });
      }

      const introFloatTargets = [
        Object.freeze({
          applyPose: setIntroTitlePose,
          element: introTitle,
          orbitPhase: 0.45,
          profile: TITLE_FLOAT_PROFILE,
          rotationPhase: 1.1
        }),
        Object.freeze({
          applyPose: setAstronautPose,
          element: introAstronaut,
          orbitDirection: astronautOrbitDirection,
          orbitPhase: 2.05 + (astronautOrbitOffsetTurns * TAU),
          profile: ASTRONAUT_FLOAT_PROFILE,
          rotationDirection: astronautRotationDirection,
          rotationPhase: 0.35 + (astronautRotationOffsetTurns * TAU)
        })
      ];

      function resetIntroFloat() {
        introFloatTargets.forEach((target) => {
          target.applyPose(0, 0, 0);
        });
      }

      function applyIntroFloatTarget(target, elapsed) {
        if (!target.element) {
          return;
        }

        const orbitAngle =
          ((elapsed / target.profile.orbitPeriodMs) * TAU * (target.orbitDirection ?? 1)) +
          target.orbitPhase;
        const rotationAngle =
          ((elapsed / target.profile.rotationPeriodMs) * TAU * (target.rotationDirection ?? 1)) +
          target.rotationPhase;

        target.applyPose(
          Math.cos(orbitAngle) * target.profile.xRadius,
          Math.sin(orbitAngle) * target.profile.yRadius,
          Math.sin(rotationAngle) * target.profile.rotationAmplitude
        );
      }

      function stepIntroFloat(timestamp) {
        if (introFloatTargets.every((target) => !target.element)) {
          introFloatFrame = 0;
          return;
        }

        if (prefersReducedMotion.matches) {
          introFloatFrame = 0;
          introFloatStartTime = 0;
          resetIntroFloat();
          return;
        }

        if (!introFloatStartTime) {
          introFloatStartTime = timestamp;
        }

        const elapsed = timestamp - introFloatStartTime;

        introFloatTargets.forEach((target) => applyIntroFloatTarget(target, elapsed));
        introFloatFrame = window.requestAnimationFrame(stepIntroFloat);
      }

      function startIntroFloat() {
        window.cancelAnimationFrame(introFloatFrame);
        introFloatFrame = 0;
        introFloatStartTime = 0;
        resetIntroFloat();

        if (introFloatTargets.every((target) => !target.element) || prefersReducedMotion.matches) {
          return;
        }

        introFloatFrame = window.requestAnimationFrame(stepIntroFloat);
      }

      function handleMotionPreferenceChange() {
        startIntroFloat();
      }

      function normalizeLocalTarget(candidate) {
        const normalizedCandidate = typeof candidate === "string" ? candidate.trim() : "";

        if (!normalizedCandidate || normalizedCandidate.startsWith("//")) {
          return "";
        }

        let resolvedUrl;

        try {
          resolvedUrl = new URL(normalizedCandidate, window.location.origin);
        } catch {
          return "";
        }

        if (resolvedUrl.origin !== window.location.origin) {
          return "";
        }

        const target = `${resolvedUrl.pathname}${resolvedUrl.search}${resolvedUrl.hash}`;

        if (
          !target.startsWith("/") ||
          target === "/login" ||
          target.startsWith("/login?") ||
          target === ENTER_PAGE_PATH ||
          target.startsWith(`${ENTER_PAGE_PATH}?`)
        ) {
          return "";
        }

        return target;
      }

      function isAdminTarget(target) {
        return typeof target === "string" && /^\/admin(?:[?#]|$)/u.test(target);
      }

      function buildAdminTarget(nextTarget) {
        if (isAdminTarget(nextTarget)) {
          return nextTarget;
        }

        const adminUrl = new URL("/admin", window.location.origin);
        adminUrl.searchParams.set("url", nextTarget || "/");
        return `${adminUrl.pathname}${adminUrl.search}${adminUrl.hash}`;
      }

      function buildAppTarget(nextTarget) {
        if (nextTarget && !isAdminTarget(nextTarget)) {
          return nextTarget;
        }

        return "/";
      }

      function grantTabAccess() {
        try {
          window.sessionStorage.setItem(ENTER_TAB_ACCESS_KEY, "1");
        } catch {
          // Ignore sessionStorage failures and continue navigation.
        }
      }

      function clearTabAccess() {
        try {
          window.sessionStorage.removeItem(ENTER_TAB_ACCESS_KEY);
        } catch {
          // Ignore sessionStorage failures on the launcher page.
        }
      }

      function navigateToTarget(targetUrl) {
        window.location.assign(targetUrl);
      }

      function bindLauncherLink(link, targetUrl) {
        if (!link || !targetUrl) {
          return;
        }

        link.href = targetUrl;
        link.addEventListener("click", (event) => {
          if (
            event.defaultPrevented ||
            event.button !== 0 ||
            event.metaKey ||
            event.ctrlKey ||
            event.shiftKey ||
            event.altKey
          ) {
            return;
          }

          event.preventDefault();
          grantTabAccess();
          navigateToTarget(targetUrl);
        });
      }

      clearTabAccess();
      if (typeof prefersReducedMotion.addEventListener === "function") {
        prefersReducedMotion.addEventListener("change", handleMotionPreferenceChange);
      } else if (typeof prefersReducedMotion.addListener === "function") {
        prefersReducedMotion.addListener(handleMotionPreferenceChange);
      }

      const nextTarget = normalizeLocalTarget(new URLSearchParams(window.location.search).get("next"));
      bindLauncherLink(introEnterSpaceLink, buildAppTarget(nextTarget));
      bindLauncherLink(introAdminLink, buildAdminTarget(nextTarget));

      if (introAstronaut && !introAstronaut.complete) {
        introAstronaut.addEventListener("load", startIntroFloat, { once: true });
      } else {
        startIntroFloat();
      }
    </script>
  </body>
</html>
